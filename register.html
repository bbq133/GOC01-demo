<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 — GOC AI 看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-layout">
    <main class="login-main">
      <a href="index.html" class="back-link">← 返回首页</a>
      <p class="welcome">创建 GOC 01 账号</p>

      <p id="invite-banner" class="invite-banner" hidden></p>

      <div id="register-form-panel">
        <form id="register-form" class="login-form" action="#" method="get" novalidate>
          <div class="field">
            <label for="username">用户名称<span class="req" aria-hidden="true">*</span></label>
            <input id="username" name="username" type="text" autocomplete="username" maxlength="64" placeholder="建议使用英文或数字，便于登录与识别" required>
          </div>
          <div class="field">
            <label for="password">密码<span class="req" aria-hidden="true">*</span></label>
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" maxlength="128" placeholder="至少 8 位，建议含大小写字母与数字" required>
          </div>
          <div class="field">
            <label for="password-confirm">确认密码<span class="req" aria-hidden="true">*</span></label>
            <input id="password-confirm" name="password_confirm" type="password" autocomplete="new-password" minlength="8" maxlength="128" placeholder="请再次输入密码" required>
          </div>
          <div class="field">
            <label for="company">企业名称<span class="req" aria-hidden="true">*</span></label>
            <input id="company" name="company" type="text" autocomplete="organization" maxlength="128" placeholder="企业全称或企业简称均可" required>
          </div>
          <div class="field">
            <label for="email">邮箱<span class="req" aria-hidden="true">*</span></label>
            <input id="email" name="email" type="email" autocomplete="email" maxlength="254" placeholder="请填写常用邮箱，用于登录验证与找回密码" required>
          </div>
          <div class="field">
            <label for="captcha">验证码</label>
            <div class="captcha-row">
              <input id="captcha" name="captcha" type="text" placeholder="请按右侧字符逐字输入（不区分大小写）" autocomplete="off" maxlength="8" required>
              <div class="captcha-box-wrap">
                <span id="captcha-display" class="captcha-placeholder captcha-code-display" aria-hidden="true"></span>
                <button type="button" class="captcha-refresh" id="captcha-refresh">看不清？换一张</button>
              </div>
            </div>
          </div>
          <div class="field-check">
            <input id="terms" name="terms" type="checkbox" value="1" required>
            <label for="terms">我已阅读并同意 <a href="#" onclick="return false;">服务条款</a> 与 <a href="#" onclick="return false;">隐私政策</a></label>
          </div>
          <button type="submit" class="btn-login">立即注册</button>
          <div class="aux-row">
            <a href="login.html">已有账号？去登录</a>
          </div>
        </form>
      </div>

    </main>

    <aside class="login-aside">
      <p class="login-aside-tag">Global OneClick</p>
      <p class="login-aside-slogan">助力全球品牌全球化</p>
      <p class="login-aside-note">（原型示意 · 无后端接口）</p>
    </aside>
  </div>

  <div
    id="register-success-toast"
    class="auth-toast register-success-toast"
    role="status"
    aria-live="polite"
    aria-atomic="true"
    hidden
    style="position:fixed;top:24px;left:50%;z-index:99999;max-width:min(360px,calc(100vw - 32px));margin:0;box-sizing:border-box;padding:14px 20px;background:#1a56db;color:#fff;border-radius:10px;text-align:center;opacity:0;transform:translate(-50%,-10px);box-shadow:0 10px 40px rgba(26,86,219,0.35);transition:opacity .2s ease,transform .2s ease;pointer-events:none"
  >
    <p class="auth-toast__title" tabindex="-1" style="margin:0;font-size:15px;font-weight:600;line-height:1.45;color:#fff">注册成功，正在进入看板…</p>
  </div>

  <style>
    /* 兜底：与服务端同源 CSS 未及时刷新时仍可显示 Toast（双写关键布局） */
    .register-success-toast.is-visible {
      opacity: 1 !important;
      transform: translate(-50%, 0) !important;
    }

    .register-success-toast[hidden] {
      display: none !important;
    }

    .invite-banner {
      padding: 12px 14px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
      border: 1px solid #c4b5fd;
      color: #4c1d95;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }
  </style>
  <script>
    (function () {
      var PROJECTS_STORAGE = 'goc01_user_projects';
      var SESSION_KEY = 'goc01_session';
      var form = document.getElementById('register-form');
      var passwordEl = document.getElementById('password');
      var passwordConfirmEl = document.getElementById('password-confirm');
      var captchaEl = document.getElementById('captcha');
      var captchaDisplay = document.getElementById('captcha-display');
      var captchaRefresh = document.getElementById('captcha-refresh');
      var inviteBanner = document.getElementById('invite-banner');
      var successToast = document.getElementById('register-success-toast');
      var REDIRECT_MS = 2000;

      var inviteParams = new URLSearchParams(window.location.search);
      var inviteToken = inviteParams.get('invite') || '';
      var inviteProjectRef = null;

      function normalizeEmail(email) {
        return (email || '').trim().toLowerCase();
      }

      function findProjectForInvite(rawToken) {
        if (!rawToken || rawToken.length < 10) return null;
        try {
          var data = JSON.parse(localStorage.getItem(PROJECTS_STORAGE) || '{"projects":[]}');
          for (var i = 0; i < data.projects.length; i++) {
            var p = data.projects[i];
            if (p.inviteToken && p.inviteToken === rawToken) return p;
          }
        } catch (e) {}
        return null;
      }

      inviteProjectRef = inviteToken ? findProjectForInvite(inviteToken) : null;
      if (inviteBanner) {
        if (inviteToken && !inviteProjectRef) {
          inviteBanner.hidden = false;
          inviteBanner.textContent = '邀请链接无效或已过期（未找到对应项目）。您仍可自行注册帐号。';
        } else if (inviteProjectRef) {
          inviteBanner.hidden = false;
          while (inviteBanner.firstChild) inviteBanner.removeChild(inviteBanner.firstChild);
          inviteBanner.appendChild(document.createTextNode('您将通过邀请加入项目 '));
          var strongName = document.createElement('strong');
          strongName.textContent = inviteProjectRef.name || '（未命名）';
          inviteBanner.appendChild(strongName);
          inviteBanner.appendChild(
            document.createTextNode(
              '。注册后即成为普通成员（无法查看项目数据源配置）；项目负责人可将管理员转让给任意成员。'
            )
          );
        }
      }
      /** 易混淆字符已剔除：0 O 1 I L */
      var CAPTCHA_CHARS = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
      var CAPTCHA_LEN = 5;
      var expectedCaptcha = '';

      function randomCaptcha() {
        var s = '';
        for (var i = 0; i < CAPTCHA_LEN; i++) {
          s += CAPTCHA_CHARS.charAt(Math.floor(Math.random() * CAPTCHA_CHARS.length));
        }
        return s;
      }

      function refreshCaptcha() {
        expectedCaptcha = randomCaptcha();
        if (captchaDisplay) {
          captchaDisplay.textContent = expectedCaptcha;
        }
        captchaEl.value = '';
        captchaEl.setCustomValidity('');
      }

      refreshCaptcha();
      if (captchaRefresh) {
        captchaRefresh.addEventListener('click', refreshCaptcha);
      }

      function clearPasswordMatchValidity() {
        passwordConfirmEl.setCustomValidity('');
      }

      passwordEl.addEventListener('input', clearPasswordMatchValidity);
      passwordConfirmEl.addEventListener('input', clearPasswordMatchValidity);

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!form.reportValidity()) return;

        if (passwordEl.value !== passwordConfirmEl.value) {
          passwordConfirmEl.setCustomValidity('两次输入的密码不一致');
          passwordConfirmEl.reportValidity();
          passwordConfirmEl.setCustomValidity('');
          return;
        }

        var answer = (captchaEl.value || '').trim().replace(/\s/g, '').toUpperCase();
        if (answer !== expectedCaptcha) {
          captchaEl.setCustomValidity('验证码不正确，请重新输入或点击换一张');
          captchaEl.reportValidity();
          captchaEl.setCustomValidity('');
          refreshCaptcha();
          return;
        }

        var email = normalizeEmail(document.getElementById('email').value);
        var username = (document.getElementById('username').value || '').trim();

        try {
          localStorage.setItem(SESSION_KEY, JSON.stringify({ email: email, username: username }));
        } catch (e) {}

        if (inviteProjectRef && inviteToken) {
          try {
            var data = JSON.parse(localStorage.getItem(PROJECTS_STORAGE) || '{"projects":[]}');
            var proj = null;
            data.projects.forEach(function (x) {
              if (x.id === inviteProjectRef.id) proj = x;
            });
            if (proj && proj.inviteToken === inviteToken) {
              proj.members = proj.members || [];
              var exists = proj.members.some(function (m) { return normalizeEmail(m.email) === email; });
              if (!exists) {
                var today = new Date();
                var ts = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
                proj.members.push({
                  email: email,
                  role: 'member',
                  addedAt: ts
                });
              }
              localStorage.setItem(PROJECTS_STORAGE, JSON.stringify(data));
            }
          } catch (err) {}
        }

        var submitBtn = form.querySelector('button[type="submit"]');
        if (submitBtn) submitBtn.disabled = true;

        function goApp() {
          window.location.href = 'app.html';
        }

        if (successToast) {
          successToast.hidden = false;
          successToast.classList.remove('is-visible');
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              successToast.classList.add('is-visible');
            });
          });
          var toastTitle = successToast.querySelector('.auth-toast__title');
          if (toastTitle && toastTitle.focus) {
            try {
              toastTitle.focus({ preventScroll: true });
            } catch (err) {}
          }
          setTimeout(goApp, REDIRECT_MS);
        } else {
          goApp();
        }
      });
    })();
  </script>
</body>
</html>
