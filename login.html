<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — GOC AI 看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-layout">
    <main class="login-main">
      <a href="index.html" class="back-link">← 返回首页</a>
      <p class="welcome">Welcome to GOC 01!</p>

      <form class="login-form" action="#" method="get" onsubmit="return false;">
        <div class="field">
          <label for="username">用户名</label>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="">
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="">
        </div>
        <div class="field">
          <label for="captcha">验证码</label>
          <div class="captcha-row">
            <input id="captcha" name="captcha" type="text" placeholder="请按右侧字符输入" autocomplete="off" maxlength="8">
            <span class="captcha-placeholder captcha-code-display" aria-hidden="true">K7M9P</span>
          </div>
        </div>
        <button type="button" class="btn-login">登录</button>
        <div class="aux-row">
          <a href="#">忘记密码？</a>
          <a href="register.html">还没有账号？注册</a>
        </div>

        <button type="button" class="btn-google" aria-label="使用 Google 登录">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.86 11.86 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
          使用 Google 登录
        </button>
        <p class="google-hint">推荐 · 使用 Google 可快速完成注册并登录</p>
      </form>

      <hr class="divider">

      <div class="staff-zone">
        <button type="button" class="btn-feishu" aria-label="飞书登录">
          <span class="feishu-icon" aria-hidden="true">飞</span>
          飞书登录
        </button>
        <p class="feishu-hint">企业飞书账号登录 · 限内部员工</p>
      </div>
    </main>

    <aside class="login-aside">
      <p class="login-aside-tag">Global OneClick</p>
      <p class="login-aside-slogan">助力全球品牌全球化</p>
      <p class="login-aside-note">（原型示意 · 无后端接口）</p>
    </aside>
  </div>
  <script>
    (function () {
      var btn = document.querySelector('.login-form .btn-login');
      if (btn) {
        btn.addEventListener('click', function () {
          var uname = (document.getElementById('username').value || '').trim();
          if (!uname) {
            alert('请输入用户名');
            return;
          }
          var email = uname.indexOf('@') !== -1 ? uname : (uname.toLowerCase() + '@goc.demo');
          try {
            localStorage.setItem(
              'goc01_session',
              JSON.stringify({ username: uname, email: email.trim().toLowerCase() })
            );
          } catch (e) {}
          window.location.href = 'app.html';
        });
      }
    })();
  </script>
</body>
</html>
